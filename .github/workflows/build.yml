name: build

on:
  push:
    branches:
      - main
      - dev
      - release/*
      - feat/app-hub
  workflow_dispatch:

jobs:
  build:
    name: build-windows
    runs-on: windows-2022

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          submodules: true

      - name: Prepare environment variables
        run: |
          echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"
          echo "APP_VERSION=$(node -p "require('./packages/hub/package.json').version")" >> "$GITHUB_ENV"

      # Native C++ core build needs MSBuild + the VS 2022 C++ workload.
      # The windows-2022 runner ships the workload by default; setup-msbuild
      # just puts msbuild.exe on PATH.
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # .NET 10 SDK for the AOT-published Pengu.exe (Pengu.Windows.csproj).
      # PublishAot uses the C++ toolchain shipped with the VS workload above.
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: |
            - recursive: true

      # Preload bundle is #include'd into core (renderer.cc embeds preload.g.h).
      # Build it before core so the header exists.
      - name: Build preload
        run: pnpm --filter @pengujs/preload build

      # C++ core -> bin/core.dll. The vcxproj writes there directly.
      - name: Build core
        run: msbuild.exe core/core.vcxproj -p:Configuration=Release -p:Platform=x64 -nologo -m

      # AOT-publish the .NET 10 host. The csproj's BuildHubBundle target runs
      # `pnpm --filter @pengujs/hub build` and zips packages/hub/dist/ into
      # app.dat as part of the build, and the PublishAppDat target adds app.dat
      # to ResolvedFileToPublish — so a single dotnet publish produces
      # Pengu.exe + app.dat in the output dir.
      - name: Publish app/Pengu.Windows (AOT)
        run: |
          dotnet publish app/Pengu.Windows \
            -c Release \
            -r win-x64 \
            --output app-publish

      # Stage the runtime payload as a clean portable folder. upload-artifact
      # zips this into a single archive with `Pengu/` as the inner wrapper —
      # extract anywhere, run Pengu.exe.
      - name: Stage portable payload
        run: |
          mkdir -p "out/"
          cp app-publish/Pengu.exe            "out/"
          cp app-publish/app.dat              "out/"
          cp app-publish/WebView2Loader.dll   "out/"
          cp bin/core.dll                     "out/"

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: Pengu-v${{ env.APP_VERSION }}-${{ env.SHORT_SHA }}-windows-x64
          # path: out (not out/Pengu) so the resulting zip contains a
          # Pengu/ folder at its root rather than the loose files.
          path: out/
          if-no-files-found: error
          compression-level: 9
